name: Frontend Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/fleetflow-zarodolgozat/fleetflow-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/fleetflow-zarodolgozat/fleetflow-frontend:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.32.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst '$IMAGE_TAG' < Frontend/deployment.yaml | kubectl apply -f -

      - name: Cleanup old images
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: fleetflow-frontend
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true
